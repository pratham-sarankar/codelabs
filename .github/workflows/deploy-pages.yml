name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install claat
        run: |
          CLAAT_VERSION="2.2.6"
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Downloading claat (attempt $i/$MAX_RETRIES)..."
            if curl -L --max-time 30 https://github.com/googlecodelabs/tools/releases/download/v${CLAAT_VERSION}/claat-linux-amd64 -o claat; then
              # Verify it's a valid binary, not an error page
              if file claat | grep -q "ELF\|executable"; then
                chmod +x claat
                sudo mv claat /usr/local/bin/
                echo "claat installed successfully"
                exit 0
              else
                echo "Downloaded file is not a valid binary, retrying..."
                rm -f claat
              fi
            else
              echo "Download failed, retrying in ${RETRY_DELAY}s..."
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              sleep $RETRY_DELAY
            fi
          done
          
          echo "Failed to download claat after $MAX_RETRIES attempts"
          exit 1

      - name: Build site
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
